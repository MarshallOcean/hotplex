<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="100%" height="auto">
  <defs>
    <!-- Gradients -->
    <linearGradient id="chatappGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eb3349"/>
      <stop offset="100%" style="stop-color:#f45c43"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>

    <!-- Arrow Markers - Request (Green, pointing RIGHT) -->
    <marker id="arrowRequest" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <!-- Arrow Markers - Response (Orange, pointing LEFT) -->
    <marker id="arrowResponse" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#f97316"/>
    </marker>
  </defs>

  <style>
    .layer-title { font: bold 15px 'Inter', -apple-system, sans-serif; fill: #fff; }
    .layer-subtitle { font: 500 10px 'Inter', -apple-system, sans-serif; fill: rgba(255,255,255,0.85); }
    .node-title { font: 600 11px 'Inter', -apple-system, sans-serif; fill: #1e293b; }
    .node-text { font: 400 9px 'Inter', -apple-system, sans-serif; fill: #64748b; }
    .id-text { font: 500 8px 'JetBrains Mono', monospace; fill: #6366f1; }
    .state-text { font: 600 9px 'Inter', -apple-system, sans-serif; }
    .flow-label { font: 500 9px 'Inter', -apple-system, sans-serif; fill: #475569; }
    .mapping-text { font: 400 8px 'Inter', -apple-system, sans-serif; fill: #94a3b8; }
    .section-title { font: bold 13px 'Inter', -apple-system, sans-serif; fill: #334155; }
  </style>

  <!-- Background -->
  <rect width="1200" height="750" fill="#f1f5f9"/>

  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" class="section-title" font-size="16">HotPlex Session Lifecycle — End-to-End Bidirectional Flow</text>

  <!-- ==================== CHATAPP LAYER ==================== -->
  <g transform="translate(25, 50)">
    <rect width="260" height="280" rx="14" fill="url(#chatappGrad)" filter="url(#shadow)"/>
    <text x="130" y="26" text-anchor="middle" class="layer-title">ChatApp Layer</text>
    <text x="130" y="42" text-anchor="middle" class="layer-subtitle">Platform Adapters</text>

    <!-- Slack -->
    <g transform="translate(15, 55)">
      <rect width="105" height="55" rx="6" fill="white"/>
      <text x="52" y="18" text-anchor="middle" class="node-title">Slack</text>
      <text x="52" y="32" text-anchor="middle" class="node-text">Socket Mode</text>
      <text x="52" y="45" text-anchor="middle" class="id-text">SessionID</text>
    </g>

    <!-- DingTalk -->
    <g transform="translate(140, 55)">
      <rect width="105" height="55" rx="6" fill="white"/>
      <text x="52" y="18" text-anchor="middle" class="node-title">DingTalk</text>
      <text x="52" y="32" text-anchor="middle" class="node-text">WebSocket</text>
      <text x="52" y="45" text-anchor="middle" class="id-text">SessionID</text>
    </g>

    <!-- Telegram -->
    <g transform="translate(15, 120)">
      <rect width="105" height="55" rx="6" fill="white"/>
      <text x="52" y="18" text-anchor="middle" class="node-title">Telegram</text>
      <text x="52" y="32" text-anchor="middle" class="node-text">Bot API</text>
      <text x="52" y="45" text-anchor="middle" class="id-text">SessionID</text>
    </g>

    <!-- Discord -->
    <g transform="translate(140, 120)">
      <rect width="105" height="55" rx="6" fill="white"/>
      <text x="52" y="18" text-anchor="middle" class="node-title">Discord</text>
      <text x="52" y="32" text-anchor="middle" class="node-text">Gateway</text>
      <text x="52" y="45" text-anchor="middle" class="id-text">SessionID</text>
    </g>

    <!-- Engine Handler -->
    <g transform="translate(15, 190)">
      <rect width="230" height="50" rx="6" fill="white" stroke="#667eea" stroke-width="1.5"/>
      <text x="115" y="18" text-anchor="middle" class="node-title">Engine Handler</text>
      <text x="115" y="32" text-anchor="middle" class="node-text">Execute() → Engine</text>
      <text x="115" y="44" text-anchor="middle" class="node-text">Callback ← Events</text>
    </g>
  </g>

  <!-- ==================== ENGINE LAYER ==================== -->
  <g transform="translate(470, 50)">
    <rect width="260" height="360" rx="14" fill="url(#engineGrad)" filter="url(#shadow)"/>
    <text x="130" y="26" text-anchor="middle" class="layer-title">Engine Layer</text>
    <text x="130" y="42" text-anchor="middle" class="layer-subtitle">Session Pool &amp; State</text>

    <!-- Session Pool -->
    <g transform="translate(15, 55)">
      <rect width="230" height="60" rx="6" fill="white"/>
      <text x="115" y="16" text-anchor="middle" class="node-title">Session Pool</text>
      <text x="115" y="30" text-anchor="middle" class="node-text">GetOrCreateSession()</text>
      <text x="115" y="42" text-anchor="middle" class="id-text">Map[SessionID]*Session</text>
      <text x="115" y="54" text-anchor="middle" class="node-text">GC: IdleTimeout Cleanup</text>
    </g>

    <!-- State Machine -->
    <g transform="translate(15, 125)">
      <rect width="230" height="75" rx="6" fill="white"/>
      <text x="115" y="14" text-anchor="middle" class="node-title">State Machine</text>

      <!-- State Flow -->
      <g transform="translate(12, 28)">
        <rect x="0" y="0" width="45" height="18" rx="3" fill="#fef3c7"/>
        <text x="22" y="12" text-anchor="middle" class="state-text" fill="#92400e" font-size="8">Starting</text>

        <path d="M 47 9 L 55 9" stroke="#94a3b8" stroke-width="1.5"/>

        <rect x="58" y="0" width="38" height="18" rx="3" fill="#bbf7d0"/>
        <text x="77" y="12" text-anchor="middle" class="state-text" fill="#166534" font-size="8">Ready</text>

        <path d="M 98 9 L 106 9" stroke="#94a3b8" stroke-width="1.5"/>

        <rect x="109" y="0" width="38" height="18" rx="3" fill="#fed7aa"/>
        <text x="128" y="12" text-anchor="middle" class="state-text" fill="#c2410c" font-size="8">Busy</text>

        <path d="M 149 9 L 157 9" stroke="#94a3b8" stroke-width="1.5"/>

        <rect x="160" y="0" width="38" height="18" rx="3" fill="#fecaca"/>
        <text x="179" y="12" text-anchor="middle" class="state-text" fill="#dc2626" font-size="8">Dead</text>
      </g>
      <text x="115" y="65" text-anchor="middle" class="node-text" font-size="8">Ready ↔ Busy: Multi-turn Streaming</text>
    </g>

    <!-- WAF -->
    <g transform="translate(15, 210)">
      <rect width="110" height="45" rx="6" fill="white" stroke="#ef4444" stroke-width="1"/>
      <text x="55" y="14" text-anchor="middle" class="node-title" fill="#dc2626" font-size="10">🛡️ WAF</text>
      <text x="55" y="28" text-anchor="middle" class="node-text">Regex Detection</text>
      <text x="55" y="39" text-anchor="middle" class="node-text">Tool Whitelist</text>
    </g>

    <!-- Event Bridge -->
    <g transform="translate(135, 210)">
      <rect width="110" height="45" rx="6" fill="white" stroke="#10b981" stroke-width="1"/>
      <text x="55" y="14" text-anchor="middle" class="node-title" fill="#059669" font-size="10">📡 Event Bridge</text>
      <text x="55" y="28" text-anchor="middle" class="node-text">thinking/answer</text>
      <text x="55" y="39" text-anchor="middle" class="node-text">tool_use/error</text>
    </g>

    <!-- Marker -->
    <g transform="translate(15, 265)">
      <rect width="230" height="38" rx="6" fill="white" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="115" y="14" text-anchor="middle" class="node-title" fill="#4f46e5" font-size="10">💾 Marker Persistence</text>
      <text x="115" y="28" text-anchor="middle" class="node-text">~/.hotplex/sessions/*.lock</text>
    </g>

    <!-- Pipe Manager -->
    <g transform="translate(15, 310)">
      <rect width="230" height="38" rx="6" fill="white" stroke="#8b5cf6" stroke-width="1"/>
      <text x="115" y="14" text-anchor="middle" class="node-title" fill="#7c3aed" font-size="10">🔀 Pipe Manager</text>
      <text x="115" y="28" text-anchor="middle" class="node-text">Stdin → JSON Input | Stdout ← Events</text>
    </g>
  </g>

  <!-- ==================== PROCESS LAYER ==================== -->
  <g transform="translate(915, 50)">
    <rect width="260" height="280" rx="14" fill="url(#processGrad)" filter="url(#shadow)"/>
    <text x="130" y="26" text-anchor="middle" class="layer-title">Process Layer</text>
    <text x="130" y="42" text-anchor="middle" class="layer-subtitle">CLI Isolation</text>

    <!-- Claude Code -->
    <g transform="translate(15, 55)">
      <rect width="230" height="55" rx="6" fill="white"/>
      <text x="115" y="16" text-anchor="middle" class="node-title">Claude Code Provider</text>
      <text x="115" y="30" text-anchor="middle" class="id-text">ProviderSessionID: UUID5-SHA1</text>
      <text x="115" y="44" text-anchor="middle" class="node-text">ParseEvent() → JSON Stream</text>
    </g>

    <!-- OpenCode -->
    <g transform="translate(15, 120)">
      <rect width="230" height="55" rx="6" fill="white"/>
      <text x="115" y="16" text-anchor="middle" class="node-title">OpenCode Provider</text>
      <text x="115" y="30" text-anchor="middle" class="id-text">ProviderSessionID: UUID1</text>
      <text x="115" y="44" text-anchor="middle" class="node-text">ParseEvent() → Line Protocol</text>
    </g>

    <!-- PGID -->
    <g transform="translate(15, 190)">
      <rect width="230" height="50" rx="6" fill="white" stroke="#f59e0b" stroke-width="1"/>
      <text x="115" y="16" text-anchor="middle" class="node-title" fill="#d97706">🔒 PGID Isolation</text>
      <text x="115" y="30" text-anchor="middle" class="node-text">Process Group: kill(-PGID)</text>
      <text x="115" y="42" text-anchor="middle" class="node-text">No Zombies • Safe Termination</text>
    </g>
  </g>

  <!-- ==================== DATA FLOW - REQUEST (Left to Right) ==================== -->
  <!-- Flow 1: ChatApp → Engine -->
  <g>
    <path id="req1" d="M 285 190 L 465 190" stroke="#10b981" stroke-width="2.5" fill="none" marker-end="url(#arrowRequest)"/>
    <rect x="340" y="172" width="70" height="16" rx="3" fill="white" opacity="0.9"/>
    <text x="375" y="183" text-anchor="middle" class="flow-label">Request →</text>
    <text x="375" y="205" text-anchor="middle" class="mapping-text">SessionID</text>
    <!-- Animated dot -->
    <circle r="4" fill="#10b981">
      <animateMotion dur="1.5s" repeatCount="indefinite">
        <mpath href="#req1"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Flow 2: Engine → Process -->
  <g>
    <path id="req2" d="M 730 150 L 910 150" stroke="#10b981" stroke-width="2.5" fill="none" marker-end="url(#arrowRequest)"/>
    <rect x="785" y="132" width="70" height="16" rx="3" fill="white" opacity="0.9"/>
    <text x="820" y="143" text-anchor="middle" class="flow-label">JSON →</text>
    <text x="820" y="165" text-anchor="middle" class="mapping-text">ProviderSessionID</text>
    <circle r="4" fill="#10b981">
      <animateMotion dur="1.2s" repeatCount="indefinite">
        <mpath href="#req2"/>
      </animateMotion>
    </circle>
  </g>

  <!-- ==================== DATA FLOW - RESPONSE (Right to Left) ==================== -->
  <!-- Flow 3: Process → Engine -->
  <g>
    <path id="resp2" d="M 910 230 L 730 230" stroke="#f97316" stroke-width="2.5" fill="none" marker-end="url(#arrowResponse)"/>
    <rect x="785" y="212" width="70" height="16" rx="3" fill="white" opacity="0.9"/>
    <text x="820" y="223" text-anchor="middle" class="flow-label">← Events</text>
    <text x="820" y="245" text-anchor="middle" class="mapping-text">ProviderEvent[]</text>
    <!-- Animated dot - moves from right to left -->
    <circle r="4" fill="#f97316">
      <animateMotion dur="1.2s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1" calcMode="linear">
        <mpath href="#resp2"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Flow 4: Engine → ChatApp -->
  <g>
    <path id="resp1" d="M 465 250 L 285 250" stroke="#f97316" stroke-width="2.5" fill="none" marker-end="url(#arrowResponse)"/>
    <rect x="340" y="232" width="70" height="16" rx="3" fill="white" opacity="0.9"/>
    <text x="375" y="243" text-anchor="middle" class="flow-label">← Callback</text>
    <text x="375" y="265" text-anchor="middle" class="mapping-text">answer/error</text>
    <!-- Animated dot - moves from right to left -->
    <circle r="4" fill="#f97316">
      <animateMotion dur="1.5s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1" calcMode="linear">
        <mpath href="#resp1"/>
      </animateMotion>
    </circle>
  </g>

  <!-- ==================== SESSION ID MAPPING ==================== -->
  <g transform="translate(25, 430)">
    <rect width="1150" height="95" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="575" y="20" text-anchor="middle" class="section-title">Session ID Mapping — Deterministic UUID5 Across Layers</text>

    <!-- Table -->
    <g transform="translate(20, 40)">
      <text x="0" y="0" class="node-title" fill="#64748b" font-size="9">Layer</text>
      <text x="150" y="0" class="node-title" fill="#64748b" font-size="9">ID Type</text>
      <text x="350" y="0" class="node-title" fill="#64748b" font-size="9">Generation</text>
      <text x="600" y="0" class="node-title" fill="#64748b" font-size="9">Example</text>
      <text x="920" y="0" class="node-title" fill="#64748b" font-size="9">Scope</text>

      <line x1="0" y1="10" x2="1110" y2="10" stroke="#e2e8f0"/>

      <text x="0" y="28" class="node-text">ChatApp</text>
      <text x="150" y="28" class="id-text">SessionID</text>
      <text x="350" y="28" class="node-text">UUID5(userID+channelID)</text>
      <text x="600" y="28" class="id-text">a1b2c3d4-e5f6-7890-abcd-ef1234567890</text>
      <text x="920" y="28" class="node-text">User conversation</text>

      <text x="0" y="48" class="node-text">Engine</text>
      <text x="150" y="48" class="id-text">cfg.SessionID</text>
      <text x="350" y="48" class="node-text">Same (passed through)</text>
      <text x="600" y="48" class="id-text">a1b2c3d4-e5f6-7890-abcd-ef1234567890</text>
      <text x="920" y="48" class="node-text">Pool key</text>

      <text x="0" y="68" class="node-text">Provider</text>
      <text x="150" y="68" class="id-text">ProviderSessionID</text>
      <text x="350" y="68" class="node-text">UUID5-SHA1(Namespace:session)</text>
      <text x="600" y="68" class="id-text">fedcba09-8765-4321-dcba-0987654321fe</text>
      <text x="920" y="68" class="node-text">CLI resume</text>
    </g>
  </g>

  <!-- ==================== PROCESS HIERARCHY ==================== -->
  <g transform="translate(25, 545)">
    <rect width="550" height="100" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="275" y="20" text-anchor="middle" class="section-title">Process Hierarchy — PGID Isolation</text>

    <g transform="translate(25, 40)">
      <rect x="0" y="0" width="90" height="28" rx="4" fill="#e0e7ff"/>
      <text x="45" y="12" text-anchor="middle" class="node-title" font-size="9">hotplexd</text>
      <text x="45" y="23" text-anchor="middle" class="mapping-text">PID: 1000</text>

      <path d="M 92 14 L 115 14" stroke="#6366f1" stroke-width="1.5"/>

      <rect x="118" y="0" width="100" height="28" rx="4" fill="#dbeafe"/>
      <text x="168" y="12" text-anchor="middle" class="node-title" font-size="9">session-abc</text>
      <text x="168" y="23" text-anchor="middle" class="mapping-text">PGID: 1001</text>

      <path d="M 220 14 L 243 14" stroke="#3b82f6" stroke-width="1.5"/>

      <rect x="246" y="0" width="80" height="28" rx="4" fill="#fce7f3"/>
      <text x="286" y="12" text-anchor="middle" class="node-title" font-size="9">claude</text>
      <text x="286" y="23" text-anchor="middle" class="mapping-text">PID: 1002</text>

      <path d="M 328 14 L 351 14" stroke="#ec4899" stroke-width="1.5"/>

      <rect x="354" y="0" width="65" height="28" rx="4" fill="#fef3c7"/>
      <text x="386" y="12" text-anchor="middle" class="node-title" font-size="9">tools</text>
      <text x="386" y="23" text-anchor="middle" class="mapping-text">PID: 1003</text>
    </g>

    <text x="275" y="85" text-anchor="middle" class="node-text" fill="#dc2626">kill(-PGID 1001) → Terminates all processes in group</text>
  </g>

  <!-- ==================== KEY FUNCTIONS ==================== -->
  <g transform="translate(600, 545)">
    <rect width="575" height="100" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="287" y="20" text-anchor="middle" class="section-title">Key Function Chain</text>

    <g transform="translate(15, 38)">
      <text x="0" y="0" class="node-title" fill="#059669" font-size="10">Request (→):</text>
      <text x="0" y="15" class="id-text" font-size="8">Execute() → GetOrCreateSession() → startSession() → WriteInput() → Stdin</text>

      <text x="0" y="38" class="node-title" fill="#f97316" font-size="10">Response (←):</text>
      <text x="0" y="53" class="id-text" font-size="8">ReadStdout() → ParseEvent() → eventBridge() → dispatchCallback() → ChatApp</text>
    </g>
  </g>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(25, 660)">
    <rect width="200" height="50" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="100" y="16" text-anchor="middle" class="node-title">Data Flow Legend</text>

    <line x1="15" y1="30" x2="45" y2="30" stroke="#10b981" stroke-width="2" marker-end="url(#arrowRequest)"/>
    <circle cx="30" cy="30" r="3" fill="#10b981">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="55" y="34" class="node-text">Request →</text>

    <line x1="110" y1="30" x2="140" y2="30" stroke="#f97316" stroke-width="2" marker-end="url(#arrowResponse)"/>
    <circle cx="125" cy="30" r="3" fill="#f97316">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="150" y="34" class="node-text">← Response</text>
  </g>

  <!-- ==================== LAYER CONNECTOR LINES ==================== -->
  <!-- ChatApp to Engine -->
  <g opacity="0.3">
    <line x1="285" y1="140" x2="285" y2="300" stroke="#667eea" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="730" y1="140" x2="730" y2="420" stroke="#11998e" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="910" y1="140" x2="910" y2="300" stroke="#eb3349" stroke-width="1" stroke-dasharray="4,4"/>
  </g>
</svg>
